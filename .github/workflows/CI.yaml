name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

env:
  RUSTFLAGS: -Dwarnings
  CARGO_TERM_COLOR: always

jobs:
  # Workspace-wide tests across multiple Rust versions
  test:
    name: Test (Rust ${{matrix.rust}})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, 1.94.0]
        include:
          - rust: nightly
            rustflags: --cfg thiserror_nightly_testing
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Checkout pkcore dependency
        env:
          GH_TOKEN: ${{ secrets.PKCORE_READ_TOKEN }}
        run: |
          git clone --depth 1 --branch dealer https://oauth2:${GH_TOKEN}@github.com/ImperialBower/pkcore.git
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{matrix.rust}}
          components: rust-src
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Build workspace
        run: cargo build --workspace --all-features --all-targets
        env:
          RUSTFLAGS: ${{matrix.rustflags}} ${{env.RUSTFLAGS}}
      - name: Test workspace
        run: cargo test --workspace --all-features
        env:
          RUSTFLAGS: ${{matrix.rustflags}} ${{env.RUSTFLAGS}}

  # Test individual crates to ensure they work independently
  test-crates:
    name: Test ${{matrix.crate}} (Rust stable)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - pkdealer_service
          - pkdealer_client
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Checkout pkcore dependency
        env:
          GH_TOKEN: ${{ secrets.PKCORE_READ_TOKEN }}
        run: |
          git clone --depth 1 --branch dealer https://oauth2:${GH_TOKEN}@github.com/ImperialBower/pkcore.git
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-crate-${{ matrix.crate }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Build crate
        run: cargo build --package ${{matrix.crate}} --all-features
      - name: Test crate
        run: cargo test --package ${{matrix.crate}} --all-features

  # Clippy linting for the entire workspace
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Checkout pkcore dependency
        env:
          GH_TOKEN: ${{ secrets.PKCORE_READ_TOKEN }}
        run: |
          git clone --depth 1 --branch dealer https://oauth2:${GH_TOKEN}@github.com/ImperialBower/pkcore.git
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rust-src
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - name: Run clippy on workspace
        run: cargo clippy --workspace

  # Format check for all code
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Checkout pkcore dependency
        env:
          GH_TOKEN: ${{ secrets.PKCORE_READ_TOKEN }}
        run: |
          git clone --depth 1 --branch dealer https://oauth2:${GH_TOKEN}@github.com/ImperialBower/pkcore.git
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, rust-src
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Documentation generation for all crates
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Checkout pkcore dependency
        env:
          GH_TOKEN: ${{ secrets.PKCORE_READ_TOKEN }}
        run: |
          git clone --depth 1 --branch dealer https://oauth2:${GH_TOKEN}@github.com/ImperialBower/pkcore.git
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-docs, rust-src
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - name: Generate documentation
        run: cargo doc --workspace --no-deps --document-private-items --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"
